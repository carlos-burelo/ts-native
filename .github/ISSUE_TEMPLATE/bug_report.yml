name: Bug report
description: Report a reproducible bug in TSN
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include a minimal reproduction.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the issue.
      placeholder: Type checker rejects valid structural assignment
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Exact commands and input files needed to reproduce.
      placeholder: |
        1. Create file test.tsn with...
        2. Run: cargo run --bin tsn -- .\test.tsn
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Rust version, TSN commit.
      placeholder: Windows 11, rustc 1.82.0, commit abc123
    validations:
      required: true
